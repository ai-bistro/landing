<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CZC6XJ16E4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CZC6XJ16E4');
    </script>

    <title>AI BISTRO — Redirecting…</title>
    <meta http-equiv="refresh" content="3;url=/en/">
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0c0a;
            --fg: #f0e9d8;
            --fg-soft: #f0e9d899;
            --gold: #d4a64a;
            --line: #f0e9d820;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.75rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            margin-bottom: 1.5rem;
        }
        p {
            color: var(--fg-soft);
            margin-bottom: 2.5rem;
            font-style: italic;
            font-size: 1.05rem;
        }
        .lang-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .lang-links a {
            display: inline-block;
            padding: 0.85rem 2rem;
            border: 1px solid var(--line);
            color: var(--fg);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.25s;
        }
        .lang-links a:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
    </style>
    <script>
        (function() {
            var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
            if (lang.indexOf('sl') === 0) {
                window.location.replace('/sl/');
            } else if (lang.indexOf('de') === 0) {
                window.location.replace('/de/');
            } else {
                window.location.replace('/en/');
            }
        })();
    </script>
</head>
<body>
    <h1>AI BISTRO</h1>
    <p>Choose your language / Izberite jezik / Sprache wählen</p>
    <div class="lang-links">
        <a href="/en/">English</a>
        <a href="/sl/">Slovenščina</a>
        <a href="/de/">Deutsch</a>
    </div>
</body>
</html>
